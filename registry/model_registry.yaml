# ==========================================
# Model & Agent Registry
# ==========================================

models:
  nllb-200:
    vram_mb: 2048
    context_window: 4096
    supports_thinking: false
    tags: ["translator", "preprocessing", "seq2seq"]
    green_flags: "Идеально и быстро переводит тексты между 200+ языками с сохранением смысла."
    red_flags: "Не умеет рассуждать, не может выполнять сложные инструкции, строго для перевода."

  gemma-3-1b:
    vram_mb: 500
    context_window: 8192
    supports_thinking: false
    tags: ["fast", "router", "json-validator"]
    green_flags: "Идеальна для быстрой классификации, валидации синтаксиса и простых JSON ответов."
    red_flags: "Не справляется со сложной логикой, математикой и длинным CoT."

  ministral-8b-instruct:
    vram_mb: 4500
    context_window: 32768
    supports_thinking: false
    tags: ["worker", "parser", "summarizer"]
    green_flags: "Высокая скорость (TPOT), отлично парсит логи и делает саммари."
    red_flags: "Теряет нить в очень сложных архитектурных задачах кодинга."

  phi-4:
    vram_mb: 5000
    context_window: 16384
    supports_thinking: true
    tags: ["architect", "cot", "dag-builder"]
    green_flags: "Великолепный Chain-of-Thought, строго держит структуру, отлично декомпозирует."
    red_flags: "Хуже работает с огромными сырыми дампами из-за лимита контекста."

  deepseek-coder-v2-lite:
    vram_mb: 14000
    context_window: 32768
    supports_thinking: false
    tags: ["worker", "coding", "heavy", "moe"]
    green_flags: "Абсолютная имба в написании кода, рефакторинге и поиске багов. Прекрасно держит контекст репозитория."
    red_flags: "Может излишне усложнять простой код. Потребляет больше VRAM из-за архитектуры."

  nllb-200:
    vram_mb: 3000
    context_window: 2048
    supports_thinking: false
    tags: ["worker", "translation", "encoder-decoder"]
    green_flags: "Лучшая локальная модель для перевода на 200+ языков (включая редкие). Быстрая и точная."
    red_flags: "Это не LLM (не умеет поддерживать диалог или рассуждать), только жесткий перевод 'текст A -> текст B'."

default_params:
  temperature: 0.1
  top_p: 0.9
  repetition_penalty: 1.15
  max_loop_iterations: 5
