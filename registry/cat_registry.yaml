# ==========================================
# CAT (Context-Augmenting Tools) Registry
# ==========================================
# Используется Узлом 1 (Data Gatherer) в Default Pipeline.
# Ядро строго валидирует генерацию нейронки по этому словарю.

tools:
  ls:
    description: "List directory contents"
    allowed_flags:
      - l
      - a
      - h

  cat:
    description: "Print file contents"
    allowed_flags:
      - n

  grep:
    description: "Search text using patterns"
    allowed_flags:
      - i
      - v
      - r
      - n

  journalctl:
    description: "Query the systemd journal"
    allowed_flags:
      - u
      - n: "[int]"
      - f
      - S: "[string] (Since date)"

  google_search:
    description: "Search the web"
    allowed_args:
      pages: "[int]"
      engine: "[google, yandex, duckduckgo]"
